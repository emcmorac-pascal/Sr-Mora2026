<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Misterios Luminosos</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="page-mystery" style="--mystery-bg: url('../img/fondo-luminosos.jpg');">

  <div class="container mystery-shell">
    <div class="top-actions mb-4">
      <a href="oraciones.html" class="btn btn-outline-light back-link">← Volver a escoger misterios</a>
    </div>

    <section class="hero-panel">
      <div class="hero-head">
        <h1 class="hero-title" id="tituloGeneral">Misterios Luminosos</h1>
        <p class="hero-subtitle" id="subtituloGeneral"></p>
      </div>

      <div class="progress-wrap">
        <div class="progress">
          <div class="progress-bar" id="barraProgreso" role="progressbar" style="width: 20%;" aria-valuemin="0" aria-valuemax="100" aria-valuenow="20"></div>
        </div>
      </div>

      <div class="mystery-display fade-in" id="mysteryDisplay">
        <div class="badge-counter" id="contadorMisterio">Misterio 1 de 5</div>
        <div class="mystery-number" id="numeroMisterio"></div>
        <h2 class="mystery-title-main" id="tituloMisterio"></h2>
        <p class="mystery-description" id="descripcionMisterio"></p>
        <p class="mystery-fruit" id="frutoMisterio"></p>

        <div class="rosary-prayers">
          <p class="rosary-step">Después del misterio se reza:</p>
          <ul class="rosary-list">
            <li>1 Padre Nuestro</li>
            <li>10 Ave Marías</li>
            <li>Gloria al Padre, al Hijo y al Espíritu Santo</li>
          </ul>
        </div>

        <div class="control-buttons">
          <button class="btn btn-outline-light" onclick="anteriorMisterio()">Anterior</button>
          <button class="btn btn-gold" onclick="siguienteMisterio()">Siguiente</button>
        </div>
      </div>

      <div class="quick-list">
        <h4>Ir directamente a un misterio</h4>
        <div class="quick-buttons" id="quickButtons"></div>
      </div>
    </section>
  </div>

  <script src="../js/main.js"></script>
  <script>
    iniciarPaginaMisterios("luminosos");
  </script>
</body>
</html>
